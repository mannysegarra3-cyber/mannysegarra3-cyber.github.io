<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manny Segarra 3 | The Agile Knight</title>
  <style>

    @font-face {
      font-family: 'BlackGoth';
      src: url('fonts/black-goth/Black Goth - Reguler.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --gold:     #f0b429;
      --gold-lt:  #ffd166;
      --black:    #000000;
      --bg:       #0a0a0a;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--gold);
      font-family: 'BlackGoth', Georgia, serif;
    }

    /* ── TOP BAR ── */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
    }

    .site-name {
      font-family: 'BlackGoth', Georgia, serif;
      font-size: 1.4rem;
      color: var(--gold);
      letter-spacing: 0.08em;
    }

    .top-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    .top-nav a {
      color: var(--gold);
      text-decoration: none;
      transition: color 0.2s;
      font-family: 'BlackGoth', Georgia, serif;
      font-size: 1rem;
    }

    .top-nav a:hover { color: var(--gold-lt); }

    .top-nav .divider {
      color: var(--gold);
      opacity: 0.4;
    }

    /* ── HERO IMAGE ── */
    .hero-image {
      width: 100%;
      padding-top: 56px; /* offset for fixed top bar */
      display: block;
      line-height: 0;
    }

    .hero-image img {
      width: 100%;
      max-height: 95vh;
      object-fit: contain;
      object-position: center center;
      display: block;
      background: var(--black);
    }

    /* ── NAV BUTTONS ── */
    .nav-buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px 32px;
      flex-wrap: wrap;
      background: var(--black);
    }

    .nav-btn {
      display: inline-block;
      font-family: 'BlackGoth', Georgia, serif;
      font-size: 1.3rem;
      color: var(--gold);
      text-decoration: none;
      border: 2px solid var(--gold);
      border-radius: 999px;
      padding: 18px 44px;
      letter-spacing: 0.08em;
      transition: background 0.25s, color 0.25s, transform 0.2s, box-shadow 0.25s;
      white-space: nowrap;
    }

    .nav-btn:hover {
      background: var(--gold);
      color: var(--black);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(201, 168, 76, 0.35);
    }

    /* ── MOBILE ── */
    @media (max-width: 640px) {

      .site-name {
        font-size: 0.95rem;
        letter-spacing: 0.04em;
      }

      .top-nav a {
        font-size: 0.85rem;
      }

      .top-bar {
        padding: 12px 16px;
      }

      .nav-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        padding: 32px 20px 48px;
      }

      .nav-btn {
        font-size: 1.1rem;
        padding: 16px 12px;
        text-align: center;
        white-space: normal;
      }
    }

    /* ── FOOTER ── */
    footer {
      background: var(--black);
      border-top: 1px solid rgba(201, 168, 76, 0.15);
      text-align: center;
      padding: 16px 32px;
      font-size: 0.75rem;
      color: rgba(201, 168, 76, 0.4);
      letter-spacing: 0.05em;
      font-family: Georgia, serif;
    }

  </style>
</head>
<body>

  <!-- TOP BAR -->
  <header class="top-bar">
    <span class="site-name">Manny Segarra 3 &nbsp;⚔&nbsp; The Agile Knight</span>
    <nav class="top-nav">
      <a href="#">Login</a>
      <span class="divider">&nbsp;|&nbsp;</span>
      <a href="#">Contact Me</a>
    </nav>
  </header>

  <!-- MAIN IMAGE -->
  <div class="hero-image">
    <img src="KNEELING KNIGHT.png" alt="The Agile Knight" />
  </div>

  <!-- FOUR NAV BUTTONS -->
  <div class="nav-buttons">
    <a href="about.html" class="nav-btn">About Me</a>
    <a href="projects.html" class="nav-btn">My Projects</a>
    <a href="free-tools.html" class="nav-btn">Free Tools</a>
    <a href="paid-content.html" class="nav-btn">Paid Content</a>
  </div>

  <!-- FOOTER -->
  <footer>
    © 2026 Manny Segarra 3 — The Agile Knight
  </footer>

</body>
</html>
