<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Projects | The Agile Knight</title>
  <style>
    @font-face {
      font-family: 'BlackGoth';
      src: url('fonts/black-goth/Black Goth - Reguler.otf') format('opentype');
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:    #f0b429;
      --gold-lt: #ffd166;
      --black:   #000000;
    }
    html, body {
      background: var(--black);
      color: var(--gold);
      font-family: 'BlackGoth', Georgia, serif;
    }

    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 32px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
    }
    .site-name { font-size: 1.3rem; color: var(--gold); letter-spacing: 0.08em; }
    .top-nav { display: flex; align-items: center; gap: 6px; }
    .top-nav a {
      color: var(--gold); text-decoration: none; font-size: 1rem;
      letter-spacing: 0.05em; transition: color 0.2s;
    }
    .top-nav a:hover { color: var(--gold-lt); }
    .top-nav .divider { color: var(--gold); opacity: 0.4; }

    .hero-image { width: 100%; padding-top: 56px; line-height: 0; }
    .hero-image img {
      width: 100%; max-height: 95vh;
      object-fit: contain; object-position: center center;
      display: block; background: var(--black);
    }

    .home-btn {
      display: inline-block;
      margin: 36px 32px 0;
      font-family: 'BlackGoth', Georgia, serif;
      font-size: 1rem; color: var(--gold); text-decoration: none;
      border: 1px solid rgba(240,180,41,0.4);
      border-radius: 999px; padding: 10px 28px;
      letter-spacing: 0.06em; transition: background 0.2s, color 0.2s;
    }
    .home-btn:hover { background: var(--gold); color: var(--black); }

    .nav-buttons {
      display: flex; align-items: center; justify-content: center;
      gap: 20px; padding: 48px 32px 64px; flex-wrap: wrap;
    }
    .nav-btn {
      display: inline-block;
      font-family: 'BlackGoth', Georgia, serif;
      font-size: 1.2rem; color: var(--gold); text-decoration: none;
      border: 2px solid var(--gold); border-radius: 999px;
      padding: 16px 36px; letter-spacing: 0.08em; white-space: nowrap;
      transition: background 0.25s, color 0.25s, transform 0.2s, box-shadow 0.25s;
    }
    .nav-btn:hover {
      background: var(--gold); color: var(--black);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(240,180,41,0.3);
    }

    footer {
      border-top: 1px solid rgba(240,180,41,0.12);
      text-align: center; padding: 16px 32px;
      font-family: Georgia, serif; font-size: 0.75rem;
      color: rgba(240,180,41,0.3);
    }
  </style>
</head>
<body>

  <header class="top-bar">
    <span class="site-name">Manny Segarra 3 &nbsp;⚔&nbsp; The Agile Knight</span>
    <nav class="top-nav">
      <a href="#">Login</a>
      <span class="divider">&nbsp;|&nbsp;</span>
      <a href="#">Contact Me</a>
    </nav>
  </header>

  <div class="hero-image">
    <img src="STRATEGY SESSION.png" alt="Strategy Session" />
  </div>

  <a href="index.html" class="home-btn">← Home</a>

  <div class="nav-buttons">
    <a href="#" class="nav-btn">Project One</a>
    <a href="#" class="nav-btn">Project Two</a>
    <a href="#" class="nav-btn">Project Three</a>
    <a href="#" class="nav-btn">Project Four</a>
    <a href="#" class="nav-btn">Project Five</a>
  </div>

  <footer>© 2026 Manny Segarra 3 — The Agile Knight</footer>

</body>
</html>
